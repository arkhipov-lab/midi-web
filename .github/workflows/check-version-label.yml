name: check-version-label

on:
  pull_request:
    types: [opened, synchronize, labeled, unlabeled]
    branches:
      - main

jobs:
  check:
    runs-on: ubuntu-latest

    steps:
      - name: Check version label
        uses: actions/github-script@v7
        with:
          script: |
            const labels = context.payload.pull_request.labels.map(l => l.name)

            const allowed = ['version:patch', 'version:minor', 'version:major']
            const hasLabel = labels.some(l => allowed.includes(l))

            if (!hasLabel) {
              core.setFailed(
                `PR must have one of labels: ${allowed.join(', ')}`
              )
            }
