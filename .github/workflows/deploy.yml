name: deploy

on:
  push:
    branches:
      - develop
      - main

jobs:
  deploy-dev:
    if: github.ref == 'refs/heads/develop'
    runs-on: ubuntu-latest
    environment: development

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24.14.0
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install dependencies
        working-directory: web
        run: npm ci

      - name: Run tests
        working-directory: web
        run: npm test -- --runInBand

      - name: Build app
        working-directory: web
        run: npm run build

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install pipenv
        run: pip install pipenv

      - name: Install backend dependencies
        working-directory: api
        run: pipenv install --dev

      - name: Run backend tests
        working-directory: api
        run: pipenv run pytest

      - name: Install deploy tools
        run: sudo apt-get update && sudo apt-get install -y rsync gettext-base

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' "${{ secrets.DEPLOY_SSH_PRIVATE_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H "${{ secrets.DEPLOY_HOST }}" >> ~/.ssh/known_hosts

      - name: Sync project to server
        run: |
          rsync -az --delete \
            --exclude '.git' \
            --exclude '.github' \
            --exclude 'node_modules' \
            --exclude 'dist' \
            --exclude 'coverage' \
            --exclude 'certbot' \
            --exclude 'deploy/nginx/default.conf' \
            ./ "${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}:/opt/midi-web/"

      - name: Deploy on server
        run: |
          ssh "${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}" "
            set -e
            cd /opt/midi-web
            export DOMAIN='${{ vars.DOMAIN }}'
            mkdir -p deploy/nginx certbot/conf certbot/www
            envsubst '\$DOMAIN' < deploy/nginx/default.conf.template > deploy/nginx/default.conf
            docker compose up -d --build
          "

  deploy-prod:
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24.14.0
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install dependencies
        working-directory: web
        run: npm ci

      - name: Run tests
        working-directory: web
        run: npm test -- --runInBand

      - name: Build app
        working-directory: web
        run: npm run build

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install pipenv
        run: pip install pipenv

      - name: Install backend dependencies
        working-directory: api
        run: pipenv install --dev

      - name: Run backend tests
        working-directory: api
        run: pipenv run pytest

      - name: Install deploy tools
        run: sudo apt-get update && sudo apt-get install -y rsync gettext-base

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' "${{ secrets.DEPLOY_SSH_PRIVATE_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H "${{ secrets.DEPLOY_HOST }}" >> ~/.ssh/known_hosts

      - name: Sync project to server
        run: |
          rsync -az --delete \
            --exclude '.git' \
            --exclude '.github' \
            --exclude 'node_modules' \
            --exclude 'dist' \
            --exclude 'coverage' \
            --exclude 'certbot' \
            --exclude 'deploy/nginx/default.conf' \
            ./ "${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}:/opt/midi-web/"

      - name: Deploy on server
        run: |
          ssh "${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}" "
            set -e
            cd /opt/midi-web
            export DOMAIN='${{ vars.DOMAIN }}'
            mkdir -p deploy/nginx certbot/conf certbot/www
            envsubst '\$DOMAIN' < deploy/nginx/default.conf.template > deploy/nginx/default.conf
            docker compose up -d --build
          "
